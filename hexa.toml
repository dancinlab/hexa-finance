# hexa.toml — hexa-finance standalone package manifest
#
# 💰 HEXA-FINANCE — n=6 blockchain, cryptography, economics, finance, law and insurance substrate
# Provenance: extracted from canon@ded52144 on 2026-05-10
#             (11-leaf migration from canon).

[package]
name = "hexa-finance"
version = "0.1.0"
entry = "cli/hexa-finance.hexa"
description = "💰 HEXA-FINANCE — n=6 blockchain, cryptography, economics, finance, law and insurance substrate (11-verb library). Each verb derives parameters from σ(6)=12, τ(6)=4, φ(6)=2 number theory. SPEC_CATALOG_ONLY at v0.1.0."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-finance"
homepage = "https://github.com/dancinlab/hexa-finance"
readme = "README.md"
keywords = ["hexa-family", "n6-lattice", "finance", "blockchain", "cryptography", "economics", "insurance", "law-justice", "jurisprudence", "spec-catalog"]
categories = ["spec-catalog", "hexa-family"]

[[bin]]
name = "hexa-finance"
path = "cli/hexa-finance.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

[scripts]
install = "install.hexa"

# ── Verb manifest (verb_parent = "." → each verb is a top-level folder) ──
verb_parent = "."

[verbs]
blockchain = ["blockchain"]
cryptography = ["cryptography"]
currency-economics = ["currency-economics"]
ecommerce-fintech = ["ecommerce-fintech"]
economics = ["economics"]
economics-finance = ["economics-finance"]
insurance = ["insurance"]
jurisprudence = ["jurisprudence"]
law-justice = ["law-justice"]
marketing = ["marketing"]
monetary-history = ["monetary-history"]

# ── Modules manifest (primary md per verb) ────────────────
[modules]
specs = [
    "blockchain/blockchain.md",
    "cryptography/cryptography.md",
    "currency-economics/currency-economics.md",
    "ecommerce-fintech/ecommerce-fintech.md",
    "economics/economics.md",
    "economics-finance/economics-finance.md",
    "insurance/insurance.md",
    "jurisprudence/jurisprudence.md",
    "law-justice/law-justice.md",
    "marketing/marketing.md",
    "monetary-history/monetary-history.md",
]

[dependencies]
hexa-lang = ">=1.0.0"
python    = ">=3.10"   # stdlib only

# ── n=6 master identity ───────────────────────────────────
[invariants.n6]
sigma_6           = 12
tau_6             = 4
phi_6             = 2
J_2               = 24
master_identity   = "σ(6) · φ(6) = n · τ(6) = J₂ = 24"
verb_count        = 11

# ── Closure provenance ────────────────────────────────────
[closure]
verbs_total       = 11
verbs_wired       = 0
verbs_spec        = 11
verifiers_pass    = "TBD (initial extraction)"
verdict           = "SPEC_CATALOG_ONLY"
extracted_from    = "canon@ded52144 on 2026-05-10"

# ── Scope honesty ─────────────────────────────────────────
[scope]
honest_scope = "💰 11-verb blockchain, cryptography, economics, finance, law and insurance substrate library. Reading the closed-form spec is grounded; running it requires the unsolved engineering or domain implementation."

[cost]
mac_local_default = "$0 (markdown spec library + .hexa CLI)"
all_verbs         = "$0 (read-only)"
